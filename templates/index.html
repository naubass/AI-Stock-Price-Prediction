<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Stock Analytics | LSTM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-6">

    <div class="glass max-w-2xl w-full rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-blue-600/20 p-8 border-b border-white/10 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-500 rounded-2xl mb-4 shadow-lg shadow-blue-500/20">
                <i class="fas fa-chart-line text-2xl text-white"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-white">AI Stock <span class="text-blue-400">Predictor</span></h1>
            <p class="text-slate-400 mt-2">Deep Learning LSTM Model Analysis</p>
        </div>

        <div class="p-8">
            <div class="flex space-x-4 mb-8 bg-slate-900/50 p-1 rounded-xl">
                <button onclick="switchTab('manual')" id="btnManual" class="flex-1 py-2 px-4 rounded-lg transition duration-200 font-medium text-sm bg-blue-600 text-white">
                    <i class="fas fa-keyboard mr-2"></i>Manual Input
                </button>
                <button onclick="switchTab('upload')" id="btnUpload" class="flex-1 py-2 px-4 rounded-lg transition duration-200 font-medium text-sm text-slate-400 hover:text-white">
                    <i class="fas fa-file-csv mr-2"></i>Upload Dataset
                </button>
            </div>

            <div id="sectionManual" class="space-y-4">
                <label class="block text-sm font-medium text-slate-300">Last 30 Days Close Price</label>
                <textarea id="inputData" rows="4" 
                    class="w-full p-4 bg-slate-900/50 border border-white/10 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition placeholder-slate-600" 
                    placeholder="Contoh: 185.1, 186.4, 184.2..."></textarea>
                <button onclick="getManualPrediction()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-600/30 transition-all active:scale-95">
                    Analyze & Predict
                </button>
            </div>

            <div id="sectionUpload" class="hidden space-y-4">
                <div class="border-2 border-dashed border-white/10 rounded-2xl p-8 text-center hover:border-blue-500/50 transition cursor-pointer" onclick="document.getElementById('csvFile').click()">
                    <i class="fas fa-cloud-upload-alt text-4xl text-slate-500 mb-3"></i>
                    <p class="text-sm text-slate-400">Drag and drop your CSV file here or <span class="text-blue-400">browse</span></p>
                    <input type="file" id="csvFile" accept=".csv" class="hidden" onchange="updateFileName()">
                    <p id="fileNameDisplay" class="mt-2 text-xs text-blue-300 font-mono"></p>
                </div>
                <button onclick="uploadAndPredict()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-600/30 transition-all active:scale-95">
                    Run Analysis
                </button>
            </div>

            <div id="resultBox" class="mt-8 hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="bg-gradient-to-r from-blue-600/20 to-emerald-600/20 border border-white/10 p-6 rounded-2xl text-center">
                    <p class="text-slate-400 text-sm font-medium mb-1">Predicted Next Price</p>
                    <div class="flex items-center justify-center space-x-3">
                        <span class="text-4xl font-black text-white" id="predictionValue">$0.00</span>
                        <i class="fas fa-caret-up text-emerald-400 text-2xl"></i>
                    </div>
                    <p class="text-[10px] text-slate-500 mt-3 uppercase tracking-widest">Calculated by LSTM Neural Network</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(type) {
            const isManual = type === 'manual';
            document.getElementById('sectionManual').classList.toggle('hidden', !isManual);
            document.getElementById('sectionUpload').classList.toggle('hidden', isManual);
            
            document.getElementById('btnManual').className = isManual ? 
                'flex-1 py-2 px-4 rounded-lg bg-blue-600 text-white font-medium text-sm' : 
                'flex-1 py-2 px-4 rounded-lg text-slate-400 hover:text-white font-medium text-sm';
            
            document.getElementById('btnUpload').className = !isManual ? 
                'flex-1 py-2 px-4 rounded-lg bg-blue-600 text-white font-medium text-sm' : 
                'flex-1 py-2 px-4 rounded-lg text-slate-400 hover:text-white font-medium text-sm';
        }

        function updateFileName() {
            const input = document.getElementById('csvFile');
            document.getElementById('fileNameDisplay').innerText = input.files[0]?.name || '';
        }

        async function getManualPrediction() {
            const inputVal = document.getElementById('inputData').value;
            const prices = inputVal.split(',').map(Number);
            if (prices.length !== 30) return alert("Please enter exactly 30 prices.");
            sendRequest('/predict', { prices: prices });
        }

        async function uploadAndPredict() {
            const fileInput = document.getElementById('csvFile');
            if (!fileInput.files[0]) return alert("Please select a CSV file.");
            
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            sendRequest('/upload', formData, true);
        }

        async function sendRequest(url, body, isFile = false) {
            try {
                const options = isFile ? { method: 'POST', body: body } : {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                };

                const response = await fetch(url, options);
                const data = await response.json();
                
                if (data.prediction) {
                    document.getElementById('resultBox').classList.remove('hidden');
                    document.getElementById('predictionValue').innerText = `$${data.prediction.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                } else if (data.error) {
                    alert(data.error);
                }
            } catch (e) {
                alert("Connection failed.");
            }
        }
    </script>
</body>
</html>
